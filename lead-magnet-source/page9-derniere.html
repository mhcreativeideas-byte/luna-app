<!doctype html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
  .page{
    background:
      radial-gradient(130% 55% at 50% 108%, rgba(240,196,179,.45) 0%, rgba(240,196,179,0) 55%),
      linear-gradient(180deg,#FBE4E8 0%, #F9DDE2 50%, #F6D4DB 100%);
    display:flex; flex-direction:column; align-items:center;
    padding:86px 78px 46px;
  }
  h1{ font-family:var(--display); font-weight:500; color:var(--ink);
    font-size:44px; line-height:1.14; text-align:center; margin-top:0; }
  .sub{ text-align:center; font-size:16px; line-height:1.55; color:var(--muted);
    max-width:520px; margin-top:14px; }
  /* phone */
  .phone{ margin-top:26px; width:248px; padding:9px; border-radius:42px;
    background:linear-gradient(160deg,#2b2226,#4a3f43);
    box-shadow:0 26px 55px rgba(120,60,72,.30), 0 6px 16px rgba(45,34,38,.18); }
  .phone img{ display:block; width:100%; border-radius:34px; }
  /* cta */
  .cta{ margin-top:28px; display:inline-block; text-align:center;
    padding:19px 46px; border-radius:100px; font-family:var(--font);
    font-size:18px; font-weight:600; letter-spacing:.2px; color:#fff;
    background:#C4727F;
    box-shadow:0 16px 34px rgba(168,90,102,.28); }
  .handles{ text-align:center; font-family:var(--font); font-size:13px;
    letter-spacing:.4px; color:var(--rose-deep); margin-top:24px; opacity:.85; }
  .tagline{ font-family:var(--display); font-style:italic; font-size:19px;
    color:var(--rose-deep); text-align:center; margin-top:18px; }
</style></head>
<body>
<div class="page">
  <h1>Tout ton cycle,<br>dans ta poche.</h1>
  <p class="sub">Plus jamais seule face à ton assiette.<br>Chaque jour, tu sais ce qui apaise ton corps<br>et relance ton énergie.</p>

  <div class="phone">
    <img src="assets/manger-hd-clean.png" alt="Aperçu de l'app LUNA">
  </div>

  <div class="cta">Prochainement sur l'App Store</div>

  <div class="handles">@luna.cyclesfood&nbsp;&nbsp;·&nbsp;&nbsp;lunawellness.app</div>
  <p class="tagline">Ton corps a un rythme. Apprends à le nourrir.</p>
</div>
</body></html>
